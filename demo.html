    <h2>For loop</h2>
    <p>Factorial de un número...</p>
    <script lang="javascript">
        function fact(){
            var res = 1;
            var num = parseInt(prompt("Inserta un número para obtener su factorial", "Insertar..."));
            for(var i = 2; i <= num; i++){
                res = res * i;
            }
            document.write("!" + num + ": " + res);
        }
    </script>
    <input type="button" onclick="fact()" value="Try"/><br/>


    <br/><br/><br/>

    <h2>For loop</h2>
    <script lang="javascript">
        //Funcion principal para calcular la media de 4 notas pedidas por pantalla
        function media(){
            var n1 = 3.5; var n2 = 3.5; var n3 = 3.5; var n4 = 3.5
            n1 = parseFloat(prompt("Inserta la primera nota:", "3.5"));
            n2 = parseFloat(prompt("Inserta la segunda nota:", "3.5"));
            n3 = parseFloat(prompt("Inserta la tercera nota:", "3.5"));
            n4 = parseFloat(prompt("Inserta la última nota:", "3.5"));
            if((n1||n2||n3||n4) == ""){return;}
            var n = [n1, n2, n3, n4]
            var res = 0;
            for(var i = 0; i<4; i++){res += n[i];}
            document.write("La nota media es: " + res/4, ": " + pass(res/4));
        }

        //Función auxiliar para determinar qué media ha sacado
        function pass(n){
            var res = "<strong>";
            if(n < 4.99){res += "Suspenso.";}
            else if(n <= 5.5){res += "Justito.";}
            else if(n < 7){res += "Aprobado.";}
            else if(n < 9){res += "Notable.";}
            else if(n <= 10){res += "Sobresaliente.";}
            else{return NaN}
            return res + "<strong>";
        }
    </script>

    <form>
        <fieldset><legend>Media:</legend>  
            <input type="button" onclick="setTimeout('media()', 1000)" value="Enter"/><br/>
        </fieldset>
    </form>
